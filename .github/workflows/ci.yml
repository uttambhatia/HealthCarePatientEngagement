name: CI

on:
  push:
    branches: [main, copilot/**]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Kubernetes OAuth2 wiring
        run: bash scripts/validate-k8s-security-env.sh

      - name: Validate Kubernetes deployment baseline
        run: bash scripts/validate-k8s-deployment-baseline.sh

      - name: Validate Kubernetes routing hygiene
        run: bash scripts/validate-k8s-routing-hygiene.sh

      - name: Validate Kubernetes NetworkPolicy hygiene
        run: bash scripts/validate-k8s-networkpolicy-hygiene.sh

      - name: Validate Kubernetes resilience hygiene
        run: bash scripts/validate-k8s-resilience-hygiene.sh

      - name: Validate Kubernetes scheduling hygiene
        run: bash scripts/validate-k8s-scheduling-hygiene.sh

      - name: Validate Kubernetes observability env wiring
        run: bash scripts/validate-k8s-observability-env.sh

      - name: Validate Kubernetes runtime security hygiene
        run: bash scripts/validate-k8s-runtime-security-hygiene.sh

      - name: Validate Kubernetes rollout hygiene
        run: bash scripts/validate-k8s-rollout-hygiene.sh

      - name: Validate Kubernetes Azure SQL wiring
        run: bash scripts/validate-k8s-azure-sql-env.sh

      - name: Validate private endpoint dependency wiring
        run: bash scripts/validate-k8s-private-endpoint-env.sh

      - name: Validate integration adapter readiness
        run: bash scripts/validate-integration-adapter-readiness.sh

      - name: Validate integration reliability hygiene
        run: bash scripts/validate-integration-reliability-hygiene.sh

      - name: Validate integration adapter contract tests
        run: bash scripts/validate-integration-adapter-contract-tests.sh

      - name: Validate integration correlation-id propagation
        run: bash scripts/validate-integration-correlation-id-propagation.sh

      - name: Validate API gateway route coverage
        run: bash scripts/validate-api-gateway-route-coverage.sh

      - name: Validate API gateway security policy
        run: bash scripts/validate-api-gateway-security-policy.sh

      - name: Validate correlation-id contract and propagation
        run: bash scripts/validate-correlation-id-contract.sh

      - name: Validate OpenAPI controller coverage
        run: bash scripts/validate-openapi-controller-coverage.sh

      - name: Validate OpenAPI operation parity
        run: bash scripts/validate-openapi-operation-parity.sh

      - name: Validate DR readiness artifacts
        run: bash scripts/validate-dr-readiness-artifacts.sh

      - name: Validate DR evidence freshness
        run: bash scripts/validate-dr-evidence-freshness.sh

      - name: Validate hub-spoke environment model
        run: bash scripts/validate-hub-spoke-env-model.sh

      - name: Validate edge routing app service config
        run: bash scripts/validate-edge-routing-appservice-config.sh

      - name: Validate DR traffic manager and front door runbook coverage
        run: bash scripts/validate-dr-traffic-manager-frontdoor-runbook.sh

      - name: Validate DR automation scripts
        run: bash scripts/validate-dr-automation-scripts.sh

      - name: Validate secondary DR deployment assets
        run: bash scripts/validate-secondary-dr-assets.sh

      - name: Validate DR failover smoke workflow
        run: bash scripts/validate-dr-smoke-workflow.sh

      - name: Validate APIM hardening IaC
        run: bash scripts/validate-apim-hardening-iac.sh

      - name: Validate APIM API routing IaC
        run: bash scripts/validate-apim-api-routing-iac.sh

      - name: Validate Azure parameter files
        run: bash scripts/validate-azure-parameter-files.sh

      - name: Validate APIM backend switch script
        run: bash scripts/validate-apim-backend-switch-script.sh

      - name: Validate DR combined switch script
        run: bash scripts/validate-dr-combined-switch-script.sh

      - name: Build backend
        run: mvn -B test

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
