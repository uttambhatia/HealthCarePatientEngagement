name: Frontend UI Deploy (App Service)

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-appservice.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - prod
      appServiceName:
        description: 'Azure App Service name'
        required: true
      apiBaseUrl:
        description: 'APIM base URL exposed to browser (e.g. https://api.example.com)'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ github.event.inputs.apiBaseUrl || vars.UI_VITE_API_BASE_URL || '' }}
          VITE_OIDC_CLIENT_ID: ${{ vars.UI_VITE_OIDC_CLIENT_ID }}
          VITE_OIDC_AUTHORIZATION_ENDPOINT: ${{ vars.UI_VITE_OIDC_AUTHORIZATION_ENDPOINT }}
          VITE_OIDC_TOKEN_ENDPOINT: ${{ vars.UI_VITE_OIDC_TOKEN_ENDPOINT }}
          VITE_OIDC_LOGOUT_ENDPOINT: ${{ vars.UI_VITE_OIDC_LOGOUT_ENDPOINT }}
          VITE_OIDC_REDIRECT_URI: ${{ vars.UI_VITE_OIDC_REDIRECT_URI }}
          VITE_OIDC_SCOPE: ${{ vars.UI_VITE_OIDC_SCOPE }}
          VITE_BYPASS_AUTH: ${{ vars.UI_VITE_BYPASS_AUTH || 'false' }}
          VITE_EVENTS_WS_URL: ${{ vars.UI_VITE_EVENTS_WS_URL }}
          VITE_EVENTS_SSE_URL: ${{ vars.UI_VITE_EVENTS_SSE_URL }}
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: |
            frontend/dist
            frontend/server.js

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Package frontend artifact
        run: |
          mkdir -p release
          cp -R frontend-dist/dist release/dist
          cp frontend-dist/server.js release/server.js
          cd release
          zip -r ../frontend-dist.zip .

      - name: Deploy to Azure Web App (Kudu ZipDeploy)
        env:
          AZURE_WEBAPP_PUBLISH_USERNAME: ${{ secrets.AZURE_WEBAPP_PUBLISH_USERNAME }}
          AZURE_WEBAPP_PUBLISH_PASSWORD: ${{ secrets.AZURE_WEBAPP_PUBLISH_PASSWORD }}
          KUDU_ZIPDEPLOY_URL: ${{ vars.UI_KUDU_ZIPDEPLOY_URL || format('https://{0}.scm.azurewebsites.net/api/zipdeploy', github.event.inputs.appServiceName || vars.UI_APP_SERVICE_NAME) }}
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/zipdeploy.out -w "%{http_code}" \
            -u "$AZURE_WEBAPP_PUBLISH_USERNAME:$AZURE_WEBAPP_PUBLISH_PASSWORD" \
            -X POST "$KUDU_ZIPDEPLOY_URL?isAsync=true" \
            --data-binary "@frontend-dist.zip")

          echo "ZipDeploy response code: $HTTP_CODE"
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            cat /tmp/zipdeploy.out
            exit 1
          fi
