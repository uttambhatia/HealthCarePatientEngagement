name: Redeploy Services to AKS

on:
  workflow_run:
    workflows: ["Build and Push Docker Images to GHCR"]
    types: [completed]
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Kubernetes namespace'
        required: false
        default: 'healthcare-dev'
      tag:
        description: 'Image tag to deploy'
        required: false
        default: 'latest'

env:
  NAMESPACE: ${{ github.event.inputs.namespace || 'healthcare-dev' }}
  TAG: ${{ github.event.inputs.tag || 'latest' }}
  REGISTRY: ghcr.io
  OWNER: uttambhatia
  REPOSITORY: healthcarepatientengagement

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Authenticate to Azure
        uses: azure/login@v1
        with:
          allow-no-subscriptions: true
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        continue-on-error: true

      - name: Get AKS credentials
        run: |
          echo "Getting AKS credentials from rg-azuser7080_mml.local-1nLQA/aks-hpe-devx..."
          az aks get-credentials \
            --resource-group "rg-azuser7080_mml.local-1nLQA" \
            --name "aks-hpe-devx" \
            --overwrite-existing --admin 2>/dev/null || \
          az aks get-credentials \
            --resource-group "rg-azuser7080_mml.local-1nLQA" \
            --name "aks-hpe-devx" \
            --overwrite-existing
          
          kubectl cluster-info

      - name: Force image pull and pod restart
        run: |
          echo "Applying api-gateway deployment with new configuration..."
          kubectl apply -f deploy/k8s/api-gateway/deployment.yaml -n ${{ env.NAMESPACE }}
          echo "Triggering pod restart..."
          kubectl rollout restart deployment/api-gateway -n ${{ env.NAMESPACE }}

      - name: Wait for rollout
        run: |
          echo "Waiting for api-gateway to be ready..."
          kubectl rollout status deployment/api-gateway -n ${{ env.NAMESPACE }} --timeout=5m

      - name: Check deployment status
        run: |
          echo "## Deployment Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          kubectl get deployments -n ${{ env.NAMESPACE }} -o wide >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Pod Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide >> $GITHUB_STEP_SUMMARY

      - name: Verify connectivity
        run: |
          echo "Testing API Gateway..."
          kubectl run -n ${{ env.NAMESPACE }} test-curl --image=curlimages/curl:latest --rm -it --restart=Never -- curl -s http://api-gateway:8080/actuator/health || echo "Gateway test completed"
