name: Deploy Services to AKS

on:
  workflow_run:
    workflows: ["Build and Push Docker Images to GHCR"]
    types: [completed]
  workflow_dispatch:
    inputs:
      namespace:
        description: 'Kubernetes namespace'
        required: false
        default: 'healthcare-dev'
      resourceGroup:
        description: 'Azure resource group containing the AKS cluster'
        required: false
        default: 'rg-azuser7080_mml.local-1nLQA'
      clusterName:
        description: 'AKS cluster name'
        required: false
        default: 'aks-hpe-devx'
      services:
        description: 'Comma-separated list of deployment folders to apply and restart'
        required: false
        default: 'api-gateway,svc-patient,svc-appointment,svc-careplan,svc-consent,svc-medical-record,svc-notification,svc-telemetry,svc-device-ingestion,svc-alert-management,svc-identity-adapter,svc-event-messaging'
      imageTag:
        description: 'Container image tag to deploy'
        required: false
        default: ''

env:
  NAMESPACE: ${{ github.event.inputs.namespace || 'healthcare-dev' }}
  RESOURCE_GROUP: ${{ github.event.inputs.resourceGroup || 'rg-azuser7080_mml.local-1nLQA' }}
  CLUSTER_NAME: ${{ github.event.inputs.clusterName || 'aks-hpe-devx' }}
  SERVICES: ${{ github.event.inputs.services || 'api-gateway,svc-patient,svc-appointment,svc-careplan,svc-consent,svc-medical-record,svc-notification,svc-telemetry,svc-device-ingestion,svc-alert-management,svc-identity-adapter,svc-event-messaging' }}
  IMAGE_TAG: ${{ github.event.inputs.imageTag || github.event.workflow_run.head_sha || github.sha }}
  REGISTRY: ghcr.io
  OWNER: uttambhatia
  REPOSITORY: healthcarepatientengagement

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Configure kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Authenticate to Azure (OIDC)
        id: azure_login_oidc
        continue-on-error: true
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Authenticate to Azure (credentials fallback)
        id: azure_login_sp
        if: ${{ steps.azure_login_oidc.outcome == 'failure' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure authentication
        if: ${{ steps.azure_login_oidc.outcome == 'failure' && (steps.azure_login_sp.outcome != 'success') }}
        run: |
          echo "Azure login failed."
          echo "OIDC login could not find a subscription for the configured service principal."
          echo "Fix either:"
          echo "  1) OIDC principal RBAC + subscription access (AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID), or"
          echo "  2) Provide AZURE_CREDENTIALS secret for fallback service-principal login."
          exit 1

      - name: Validate Azure context
        run: |
          az account show --query '{user:user.name, subscription:name, id:id, tenant:tenantId}' -o table

      - name: Load AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --name "${{ env.CLUSTER_NAME }}" \
            --admin \
            --overwrite-existing

      - name: Apply Kubernetes manifests
        shell: bash
        run: |
          set -euo pipefail

          services=(${SERVICES//,/ })
          for service in "${services[@]}"; do
            echo "Applying deploy/k8s/${service}"
            kubectl apply -n "${NAMESPACE}" -f "deploy/k8s/${service}"
          done

      - name: Pin deployments to the published image tag
        shell: bash
        run: |
          set -euo pipefail

          services=(${SERVICES//,/ })
          for service in "${services[@]}"; do
            container_name=$(kubectl get "deployment/${service}" -n "${NAMESPACE}" -o jsonpath='{.spec.template.spec.containers[0].name}')
            echo "Setting deployment/${service} container ${container_name} to ${IMAGE_TAG}"
            kubectl set image "deployment/${service}" "${container_name}=${REGISTRY}/${OWNER}/${REPOSITORY}/${service}:${IMAGE_TAG}" -n "${NAMESPACE}"
          done

      - name: Wait for rollout
        shell: bash
        run: |
          set -euo pipefail

          services=(${SERVICES//,/ })
          for service in "${services[@]}"; do
            echo "Waiting for deployment/${service} to be ready..."
            kubectl rollout status "deployment/${service}" -n "${NAMESPACE}" --timeout=5m
          done

      - name: Check deployment status
        shell: bash
        run: |
          {
            echo "## Deployment Status"
            echo ""
            kubectl get deployments -n "${NAMESPACE}" -o wide
            echo ""
            echo "## Pod Status"
            echo ""
            kubectl get pods -n "${NAMESPACE}" -o wide
          } >> "$GITHUB_STEP_SUMMARY"
