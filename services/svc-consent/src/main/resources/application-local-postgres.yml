spring:
  datasource:
    url: ${CONSENT_DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${CONSENT_DB_USERNAME:postgres}
    password: ${CONSENT_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${CONSENT_DB_DDL_AUTO:validate}
  sql:
    init:
      mode: always
      schema-locations: classpath:seed/local-postgres-schema.sql
      data-locations: classpath:seed/local-postgres-data.sql
      continue-on-error: false
