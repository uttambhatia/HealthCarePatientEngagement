server:
  port: 8084
spring:
  application:
    name: consent-service
  datasource:
    url: ${CONSENT_DB_URL:jdbc:h2:mem:consentdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${CONSENT_DB_USERNAME:sa}
    password: ${CONSENT_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${CONSENT_DB_DDL_AUTO:update}
    open-in-view: false
  h2:
    console:
      enabled: ${CONSENT_H2_CONSOLE:false}
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  pattern:
    level: "%5p [${spring.application.name:application},%X{correlationId:-}]"
platform:
  azure:
    servicebus:
      fqdn: ${SERVICEBUS_NAMESPACE:}
    eventhub:
      fqdn: ${EVENTHUB_NAMESPACE:}
    keyvault:
      url: ${KEY_VAULT_URL:}
  security:
    enabled: ${PLATFORM_SECURITY_ENABLED:false}
    oauth2:
      jwk-set-uri: ${OAUTH2_JWK_SET_URI:https://login.microsoftonline.com/common/discovery/v2.0/keys}
      issuer: ${OAUTH2_ISSUER:}
      audience: ${OAUTH2_AUDIENCE:}
  integration:
    audit:
      base-url: ${AUDIT_INTEGRATION_BASE_URL:}
      path: ${AUDIT_INTEGRATION_PATH:/audit/consents}
  messaging:
    channel: ${CONSENT_MESSAGING_CHANNEL:consent-service}
    processorEnabled: ${CONSENT_PROCESSOR_ENABLED:true}
    retryAttempts: 3
    deadLetterQueue: consent-service-dlq
