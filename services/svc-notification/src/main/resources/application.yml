server:
  port: 8086
spring:
  application:
    name: notification-service
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:h2:mem:notificationdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${NOTIFICATION_DB_USERNAME:sa}
    password: ${NOTIFICATION_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${NOTIFICATION_DB_DDL_AUTO:update}
    open-in-view: false
  h2:
    console:
      enabled: ${NOTIFICATION_H2_CONSOLE:false}
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  pattern:
    level: "%5p [${spring.application.name:application},%X{correlationId:-}]"
platform:
  azure:
    servicebus:
      fqdn: ${SERVICEBUS_NAMESPACE:}
    eventhub:
      fqdn: ${EVENTHUB_NAMESPACE:}
    keyvault:
      url: ${KEY_VAULT_URL:}
  security:
    enabled: ${PLATFORM_SECURITY_ENABLED:false}
    oauth2:
      jwk-set-uri: ${OAUTH2_JWK_SET_URI:https://login.microsoftonline.com/common/discovery/v2.0/keys}
      issuer: ${OAUTH2_ISSUER:}
      audience: ${OAUTH2_AUDIENCE:}
  integration:
    acs:
      base-url: ${ACS_INTEGRATION_BASE_URL:}
      path: ${ACS_INTEGRATION_PATH:/acs/notifications}
    appointment:
      base-url: ${FOLLOWUP_APPOINTMENT_BASE_URL:}
      path: ${FOLLOWUP_APPOINTMENT_PATH:/appointments/internal/follow-up}
  messaging:
    channel: ${NOTIFICATION_MESSAGING_CHANNEL:notification-service}
    followup:
      scheduledChannel: ${FOLLOWUP_SCHEDULED_CHANNEL:notification-service}
    inboundChannel: ${NOTIFICATION_INBOUND_CHANNEL:appointment-service}
    teleconsultation:
      processorEnabled: ${TELECONSULT_TOPIC_PROCESSOR_ENABLED:true}
      completedTopic: ${TELECONSULT_COMPLETED_TOPIC:teleconsultation-completed}
      completedSubscription: ${TELECONSULT_COMPLETED_SUBSCRIPTION:notification-service}
    processorEnabled: ${NOTIFICATION_PROCESSOR_ENABLED:true}
    retryAttempts: 3
    deadLetterQueue: notification-service-dlq
  teleconsult:
    followup:
      notification:
        channel: ${TELECONSULT_FOLLOWUP_NOTIFICATION_CHANNEL:SMS}
        templateId: ${TELECONSULT_FOLLOWUP_TEMPLATE_ID:teleconsult-followup-v1}
      appointment:
        channel: ${FOLLOWUP_APPOINTMENT_CHANNEL:VIDEO}
