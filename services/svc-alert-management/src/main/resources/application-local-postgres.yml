spring:
  datasource:
    url: ${ALERT_MANAGEMENT_DB_URL:jdbc:h2:mem:alertmanagementdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${ALERT_MANAGEMENT_DB_USERNAME:sa}
    password: ${ALERT_MANAGEMENT_DB_PASSWORD:}
    driver-class-name: ${ALERT_MANAGEMENT_DB_DRIVER:org.h2.Driver}
  jpa:
    hibernate:
      ddl-auto: ${ALERT_MANAGEMENT_DB_DDL_AUTO:validate}
  sql:
    init:
      mode: always
      schema-locations: classpath:seed/local-postgres-schema.sql
      data-locations: classpath:seed/local-postgres-data.sql
      continue-on-error: false
