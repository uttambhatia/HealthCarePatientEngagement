server:
  port: 8081
spring:
  application:
    name: patient-service
  datasource:
    url: ${PATIENT_DB_URL:jdbc:h2:mem:patientdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${PATIENT_DB_USERNAME:sa}
    password: ${PATIENT_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${PATIENT_DB_DDL_AUTO:update}
    open-in-view: false
  h2:
    console:
      enabled: ${PATIENT_H2_CONSOLE:false}
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  pattern:
    level: "%5p [${spring.application.name:application},%X{correlationId:-}]"
platform:
  azure:
    servicebus:
      fqdn: ${SERVICEBUS_NAMESPACE:}
    eventhub:
      fqdn: ${EVENTHUB_NAMESPACE:}
    keyvault:
      url: ${KEY_VAULT_URL:}
  security:
    enabled: ${PLATFORM_SECURITY_ENABLED:false}
    oauth2:
      jwk-set-uri: ${OAUTH2_JWK_SET_URI:https://login.microsoftonline.com/common/discovery/v2.0/keys}
      issuer: ${OAUTH2_ISSUER:}
      audience: ${OAUTH2_AUDIENCE:}
  integration:
    blob:
      connection-string: ${PLATFORM_INTEGRATION_BLOB_CONNECTION_STRING:}
      patient-idproof-container: ${PLATFORM_INTEGRATION_BLOB_PATIENT_IDPROOF_CONTAINER:patient-id-proofs}
    fhir:
      base-url: ${FHIR_INTEGRATION_BASE_URL:}
      path: ${FHIR_INTEGRATION_PATH:/fhir/patients}
    identity-adapter:
      base-url: ${IDENTITY_ADAPTER_INTEGRATION_BASE_URL:}
      path: ${IDENTITY_ADAPTER_INTEGRATION_PATH:/identity/assertions}
    notification:
      base-url: ${NOTIFICATION_INTEGRATION_BASE_URL:}
      path: ${NOTIFICATION_INTEGRATION_PATH:/notifications}
  messaging:
    channel: ${PATIENT_MESSAGING_CHANNEL:patient-service}
    processorEnabled: ${PATIENT_PROCESSOR_ENABLED:true}
    retryAttempts: 3
    deadLetterQueue: patient-service-dlq
