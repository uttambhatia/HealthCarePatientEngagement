server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      default-filters:
        - AddResponseHeader=X-Zero-Trust, enforced
management:
  endpoints:
    web:
      exposure:
        include: health,info
platform:
  security:
    enabled: ${PLATFORM_SECURITY_ENABLED:false}
    oauth2:
      jwk-set-uri: ${OAUTH2_JWK_SET_URI:https://login.microsoftonline.com/common/discovery/v2.0/keys}
      issuer: ${OAUTH2_ISSUER:}
