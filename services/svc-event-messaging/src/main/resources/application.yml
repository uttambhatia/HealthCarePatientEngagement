server:
  port: 8091
spring:
  application:
    name: event-messaging-service
  datasource:
    url: ${EVENT_MESSAGING_DB_URL:jdbc:h2:mem:eventmessagingdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${EVENT_MESSAGING_DB_USERNAME:sa}
    password: ${EVENT_MESSAGING_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${EVENT_MESSAGING_DB_DDL_AUTO:update}
    open-in-view: false
  h2:
    console:
      enabled: ${EVENT_MESSAGING_H2_CONSOLE:false}
management:
  endpoints:
    web:
      exposure:
        include: health,info
logging:
  pattern:
    level: "%5p [${spring.application.name:application},%X{correlationId:-}]"
platform:
  azure:
    servicebus:
      fqdn: ${SERVICEBUS_NAMESPACE:}
    eventhub:
      fqdn: ${EVENTHUB_NAMESPACE:}
    keyvault:
      url: ${KEY_VAULT_URL:}
  security:
    enabled: ${PLATFORM_SECURITY_ENABLED:false}
    oauth2:
      jwk-set-uri: ${OAUTH2_JWK_SET_URI:https://login.microsoftonline.com/common/discovery/v2.0/keys}
      issuer: ${OAUTH2_ISSUER:}
      audience: ${OAUTH2_AUDIENCE:}
  integration:
    service-bus:
      base-url: ${SERVICE_BUS_INTEGRATION_BASE_URL:}
      path: ${SERVICE_BUS_INTEGRATION_PATH:/servicebus/messages}
    monitoring:
      base-url: ${MONITORING_INTEGRATION_BASE_URL:}
      path: ${MONITORING_INTEGRATION_PATH:/monitoring/logs}
  monitoring:
    anomaly:
      payload-max-length: ${MONITORING_ANOMALY_PAYLOAD_MAX_LENGTH:500}
      keywords: ${MONITORING_ANOMALY_KEYWORDS:ERROR,EXCEPTION,PANIC}
  messaging:
    channel: ${EVENT_MESSAGING_CHANNEL:event-messaging-service}
    processorEnabled: ${EVENT_MESSAGING_PROCESSOR_ENABLED:true}
    retryAttempts: 3
    deadLetterQueue: event-messaging-service-dlq
