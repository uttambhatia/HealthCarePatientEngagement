openapi: 3.0.3
info:
  title: Healthcare Patient Engagement Platform API
  version: 1.0.0
  description: API-first contract examples for the care coordination platform.
servers:
  - url: https://api.healthcare.example.com
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    CorrelationIdHeader:
      name: X-Correlation-Id
      in: header
      required: false
      description: Correlation identifier propagated across the platform.
      schema:
        type: string
  headers:
    CorrelationIdResponseHeader:
      description: Correlation identifier propagated across the platform.
      schema:
        type: string
  schemas:
    PatientRequest:
      type: object
      required: [externalReference, givenName, familyName, birthDate]
      properties:
        externalReference: { type: string }
        givenName: { type: string }
        familyName: { type: string }
        birthDate: { type: string, format: date }
      example: { externalReference: "EXT-1001", givenName: "Ananya", familyName: "Sharma", birthDate: "1988-06-21" }
    AppointmentRequest:
      type: object
      required: [patientId, providerId, scheduledAt, channel]
      properties:
        patientId: { type: string }
        providerId: { type: string }
        scheduledAt: { type: string, format: date-time }
        channel: { type: string }
      example: { patientId: "pat-1001", providerId: "prov-44", scheduledAt: "2026-06-01T09:30:00Z", channel: "VIDEO" }
    TeleconsultationCompleteRequest:
      type: object
      required: [consultationNotes]
      properties:
        consultationNotes: { type: string }
        followUpRequired: { type: boolean }
        nextFollowUpDate: { type: string, format: date-time }
      example:
        consultationNotes: Consultation completed; patient advised to continue current treatment and follow-up in 2 weeks.
        followUpRequired: true
        nextFollowUpDate: 2026-07-15T11:00:00Z
    CarePlanRequest:
      type: object
      required: [patientId, goal, planStatus, ownerId, tasks]
      properties:
        patientId: { type: string }
        goal: { type: string }
        planStatus: { type: string }
        ownerId: { type: string }
        tasks:
          type: array
          items: { type: string }
      example:
        patientId: pat-1001
        goal: Improve glycemic control
        planStatus: ACTIVE
        ownerId: clinician-91
        tasks:
          - Track fasting glucose daily
          - Complete weekly nutrition review
    CarePlanUpdateRequest:
      type: object
      required: [goal, planStatus, ownerId, tasks, expectedVersion]
      properties:
        goal: { type: string }
        planStatus: { type: string }
        ownerId: { type: string }
        tasks:
          type: array
          items: { type: string }
        expectedVersion: { type: integer, minimum: 1 }
      example:
        goal: Improve glycemic control and mobility
        planStatus: ACTIVE
        ownerId: clinician-91
        tasks:
          - Track fasting glucose daily
          - Walk for 30 minutes
        expectedVersion: 1
    ConsentRequest:
      type: object
      required: [patientId, consentType, granted, effectiveFrom]
      properties:
        patientId: { type: string }
        consentType: { type: string }
        granted: { type: boolean }
        effectiveFrom: { type: string, format: date-time }
      example: { patientId: "pat-1001", consentType: "RESEARCH", granted: true, effectiveFrom: "2026-05-31T10:00:00Z" }
    NotificationRequest:
      type: object
      required: [recipientId, channel, templateId, message]
      properties:
        recipientId: { type: string }
        channel:
          type: string
          enum: [SMS, EMAIL, PUSH]
        templateId: { type: string }
        message: { type: string }
      example: { recipientId: "pat-1001", channel: "SMS", templateId: "appt-reminder-v1", message: "Your appointment is tomorrow at 09:30." }
    ServiceBusMessageRequest:
      type: object
      required: [channel, eventName, payload, messageType]
      properties:
        channel: { type: string }
        eventName: { type: string }
        payload: { type: string }
        messageType: { type: string }
      example: { channel: "care-events", eventName: "AppointmentBooked", payload: "{\"appointmentId\":\"apt-2001\"}", messageType: "DOMAIN_EVENT" }
    AlertRequest:
      type: object
      required: [patientId, severity, triggerType, summary]
      properties:
        patientId: { type: string }
        deviceId:
          type: string
          description: Optional originating device identifier when alert is telemetry-driven
        severity: { type: string }
        triggerType: { type: string }
        metricValue:
          type: string
          description: Numeric telemetry value used for threshold evaluation when provided
        summary: { type: string }
      example: { patientId: "pat-1001", deviceId: "dev-22", severity: "HIGH", triggerType: "HEART_RATE", metricValue: "124", summary: "Heart rate exceeded configured threshold." }
    TelemetryRequest:
      type: object
      required: [deviceId, metricType, metricValue, recordedAt]
      properties:
        deviceId: { type: string }
        metricType: { type: string }
        metricValue: { type: string }
        recordedAt: { type: string, format: date-time }
      example: { deviceId: "dev-22", metricType: "HEART_RATE", metricValue: "124", recordedAt: "2026-05-31T10:05:00Z" }
    MedicalRecordRequest:
      type: object
      required: [patientId, fhirResourceType, resourceReference, summary]
      properties:
        patientId: { type: string }
        fhirResourceType: { type: string }
        resourceReference: { type: string }
        summary: { type: string }
      example: { patientId: "pat-1001", fhirResourceType: "Observation", resourceReference: "Observation/obs-332", summary: "HbA1c measured at 7.4" }
    MedicalRecordUpdateRequest:
      type: object
      required: [fhirResourceType, resourceReference, summary, expectedVersion]
      properties:
        fhirResourceType: { type: string }
        resourceReference: { type: string }
        summary: { type: string }
        expectedVersion: { type: integer, minimum: 1 }
      example:
        fhirResourceType: Condition
        resourceReference: Condition/cond-332
        summary: Follow-up diagnosis updated after consultation
        expectedVersion: 1
    DeviceIngestionRequest:
      type: object
      required: [deviceId, protocol, payload, receivedAt]
      properties:
        deviceId: { type: string }
        protocol:
          type: string
          enum: [MQTT, HTTP, AMQP]
        payload:
          type: string
          description: JSON string with at least one supported metric key (bp, hr, glucose, spo2, temperature)
        receivedAt: { type: string, format: date-time }
      example: { deviceId: "dev-22", protocol: "MQTT", payload: "{\"spo2\":97}", receivedAt: "2026-05-31T10:07:00Z" }
    IdentityAssertionRequest:
      type: object
      required: [subject, tenantId, role, tokenId]
      properties:
        subject: { type: string }
        tenantId: { type: string }
        role: { type: string }
        tokenId: { type: string }
      example: { subject: "user@healthcare.example", tenantId: "tenant-77", role: "CARE_MANAGER", tokenId: "tok-93ab" }
    PatientResponse:
      type: object
      required: [id, status, externalReference, givenName, familyName, birthDate]
      properties:
        id: { type: string }
        status: { type: string }
        externalReference: { type: string }
        givenName: { type: string }
        familyName: { type: string }
        birthDate: { type: string }
      example: { id: "pat-1001", status: "ACTIVE", externalReference: "EXT-1001", givenName: "Ananya", familyName: "Sharma", birthDate: "1988-06-21" }
    AppointmentResponse:
      type: object
      required: [id, status, patientId, providerId, scheduledAt, channel]
      properties:
        id: { type: string }
        status: { type: string }
        patientId: { type: string }
        providerId: { type: string }
        scheduledAt: { type: string }
        channel: { type: string }
      example: { id: "apt-2001", status: "BOOKED", patientId: "pat-1001", providerId: "prov-44", scheduledAt: "2026-06-01T09:30:00Z", channel: "VIDEO" }
    TeleconsultationResponse:
      type: object
      required: [sessionId, appointmentId, status, doctorJoinUrl, patientJoinUrl, startedAt, interactionLogs]
      properties:
        sessionId: { type: string }
        appointmentId: { type: string }
        status: { type: string }
        doctorJoinUrl: { type: string }
        patientJoinUrl: { type: string }
        startedAt: { type: string, format: date-time }
        joinedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
        consultationNotes: { type: string }
        followUpRequired: { type: boolean }
        nextFollowUpDate: { type: string, format: date-time }
        interactionLogs:
          type: array
          items: { type: string }
      example:
        sessionId: tcs-5001
        appointmentId: apt-2001
        status: IN_PROGRESS
        doctorJoinUrl: https://teleconsult.healthcare.local/session/tcs-5001?role=DOCTOR
        patientJoinUrl: https://teleconsult.healthcare.local/session/tcs-5001?role=PATIENT
        startedAt: 2026-06-20T10:25:00Z
        joinedAt: 2026-06-20T10:30:30Z
        completedAt:
        consultationNotes:
        followUpRequired: false
        nextFollowUpDate:
        interactionLogs:
          - 2026-06-20T10:25:00Z | Teleconsultation initiated by doctor
          - 2026-06-20T10:30:30Z | Patient joined teleconsultation session
    AvailableSlotResponse:
      type: object
      required: [providerId, date, availableSlots]
      properties:
        providerId: { type: string }
        date: { type: string, format: date }
        availableSlots:
          type: array
          items: { type: string, format: date-time }
      example:
        providerId: prov-44
        date: 2026-06-01
        availableSlots:
          - 2026-06-01T09:00:00Z
          - 2026-06-01T09:30:00Z
          - 2026-06-01T10:00:00Z
    CarePlanResponse:
      type: object
      required: [id, status, patientId, goal, planStatus, ownerId, tasks, version]
      properties:
        id: { type: string }
        status: { type: string }
        patientId: { type: string }
        goal: { type: string }
        planStatus: { type: string }
        ownerId: { type: string }
        tasks:
          type: array
          items: { type: string }
        version: { type: integer }
      example:
        id: cp-3001
        status: MANAGED
        patientId: pat-1001
        goal: Improve glycemic control
        planStatus: ACTIVE
        ownerId: clinician-91
        tasks:
          - Track fasting glucose daily
          - Complete weekly nutrition review
        version: 1
    CarePlanResponsibilityResponse:
      type: object
      required: [patientId, ownerId, carePlanId, planStatus, version]
      properties:
        patientId: { type: string }
        ownerId: { type: string }
        carePlanId: { type: string }
        planStatus: { type: string }
        version: { type: integer }
      example:
        patientId: pat-1001
        ownerId: clinician-91
        carePlanId: cp-3001
        planStatus: ACTIVE
        version: 2
    ConsentResponse:
      type: object
      required: [id, status, patientId, consentType, granted, effectiveFrom]
      properties:
        id: { type: string }
        status: { type: string }
        patientId: { type: string }
        consentType: { type: string }
        granted: { type: string }
        effectiveFrom: { type: string }
      example: { id: "con-401", status: "RECORDED", patientId: "pat-1001", consentType: "RESEARCH", granted: "true", effectiveFrom: "2026-05-31T10:00:00Z" }
    ConsentAccessResponse:
      type: object
      required: [patientId, consentType, accessAllowed, reason]
      properties:
        patientId: { type: string }
        consentType: { type: string }
        accessAllowed: { type: boolean }
        reason: { type: string }
        latestVersion: { type: integer, minimum: 1 }
      example:
        patientId: pat-1001
        consentType: RESEARCH
        accessAllowed: true
        reason: Active granted consent exists
        latestVersion: 3
    NotificationResponse:
      type: object
      required: [id, status, recipientId, channel, templateId, message, deliveryAttempts]
      properties:
        id: { type: string }
        status:
          type: string
          enum: [QUEUED, DELIVERED, FAILED]
        recipientId: { type: string }
        channel:
          type: string
          enum: [SMS, EMAIL, PUSH]
        templateId: { type: string }
        message: { type: string }
        deliveryAttempts: { type: integer, minimum: 0 }
        lastError: { type: string }
      example: { id: "not-501", status: "DELIVERED", recipientId: "pat-1001", channel: "SMS", templateId: "appt-reminder-v1", message: "Your appointment is tomorrow at 09:30.", deliveryAttempts: 1, lastError: null }
    ServiceBusMessageResponse:
      type: object
      required: [id, status, channel, eventName, payload, messageType, recordedAt, integrityHash]
      properties:
        id: { type: string }
        status:
          type: string
          enum: [QUEUED, ANOMALY_DETECTED]
        channel: { type: string }
        eventName: { type: string }
        payload: { type: string }
        messageType: { type: string }
        recordedAt: { type: string, format: date-time }
        integrityHash: { type: string }
        anomalyReason: { type: string }
      example: { id: "msg-601", status: "QUEUED", channel: "care-events", eventName: "AppointmentBooked", payload: "{\"appointmentId\":\"apt-2001\"}", messageType: "DOMAIN_EVENT", recordedAt: "2026-06-22T12:59:00Z", integrityHash: "abc123hash", anomalyReason: null }
    AlertResponse:
      type: object
      required: [id, status, patientId, severity, triggerType, summary]
      properties:
        id: { type: string }
        status:
          type: string
          enum: [OPEN, SUPPRESSED, ESCALATION_FAILED]
        patientId: { type: string }
        deviceId:
          type: string
          nullable: true
        severity: { type: string }
        triggerType: { type: string }
        summary: { type: string }
      example: { id: "alt-701", status: "OPEN", patientId: "pat-1001", deviceId: "dev-22", severity: "HIGH", triggerType: "HEART_RATE", summary: "Heart rate exceeded configured threshold." }
    TelemetryResponse:
      type: object
      required: [id, status, deviceId, metricType, metricValue, recordedAt]
      properties:
        id: { type: string }
        status: { type: string }
        deviceId: { type: string }
        metricType: { type: string }
        metricValue: { type: string }
        recordedAt: { type: string }
      example: { id: "tel-801", status: "RECORDED", deviceId: "dev-22", metricType: "HEART_RATE", metricValue: "124", recordedAt: "2026-05-31T10:05:00Z" }
    MedicalRecordResponse:
      type: object
      required: [id, status, patientId, fhirResourceType, resourceReference, summary, version]
      properties:
        id: { type: string }
        status: { type: string }
        patientId: { type: string }
        fhirResourceType: { type: string }
        resourceReference: { type: string }
        summary: { type: string }
        version: { type: integer, minimum: 1 }
      example: { id: "mr-901", status: "SYNCED", patientId: "pat-1001", fhirResourceType: "Observation", resourceReference: "Observation/obs-332", summary: "HbA1c measured at 7.4", version: 1 }
    DeviceIngestionResponse:
      type: object
      required: [id, status, deviceId, protocol, payload, receivedAt]
      properties:
        id: { type: string }
        status: { type: string }
        deviceId: { type: string }
        protocol: { type: string }
        payload: { type: string }
        receivedAt: { type: string }
      example: { id: "ing-1001", status: "INGESTED", deviceId: "dev-22", protocol: "MQTT", payload: "{\"spo2\":97}", receivedAt: "2026-05-31T10:07:00Z" }
    IdentityResponse:
      type: object
      required: [id, status, subject, tenantId, role, tokenId]
      properties:
        id: { type: string }
        status: { type: string }
        subject: { type: string }
        tenantId: { type: string }
        role: { type: string }
        tokenId: { type: string }
      example: { id: "ida-1101", status: "VALIDATED", subject: "user@healthcare.example", tenantId: "tenant-77", role: "CARE_MANAGER", tokenId: "tok-93ab" }
    PatientEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/PatientResponse' }
    PatientListEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data:
          type: array
          items: { $ref: '#/components/schemas/PatientResponse' }
    AppointmentEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/AppointmentResponse' }
    AppointmentListEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data:
          type: array
          items: { $ref: '#/components/schemas/AppointmentResponse' }
    TeleconsultationEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/TeleconsultationResponse' }
    AvailableSlotEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/AvailableSlotResponse' }
    CarePlanEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/CarePlanResponse' }
    CarePlanListEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data:
          type: array
          items: { $ref: '#/components/schemas/CarePlanResponse' }
    CarePlanResponsibilityEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/CarePlanResponsibilityResponse' }
    ConsentEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/ConsentResponse' }
    ConsentListEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data:
          type: array
          items: { $ref: '#/components/schemas/ConsentResponse' }
    ConsentAccessEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/ConsentAccessResponse' }
    NotificationEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/NotificationResponse' }
    NotificationListEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data:
          type: array
          items: { $ref: '#/components/schemas/NotificationResponse' }
    ServiceBusMessageEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/ServiceBusMessageResponse' }
    ServiceBusMessageListEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data:
          type: array
          items: { $ref: '#/components/schemas/ServiceBusMessageResponse' }
    AlertEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/AlertResponse' }
    AlertListEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data:
          type: array
          items: { $ref: '#/components/schemas/AlertResponse' }
    TelemetryEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/TelemetryResponse' }
    TelemetryListEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data:
          type: array
          items: { $ref: '#/components/schemas/TelemetryResponse' }
    TelemetryMetricTypeListEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data:
          type: array
          items: { type: string }
    MedicalRecordEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/MedicalRecordResponse' }
    MedicalRecordListEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data:
          type: array
          items: { $ref: '#/components/schemas/MedicalRecordResponse' }
    DeviceIngestionEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/DeviceIngestionResponse' }
    DeviceIngestionListEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data:
          type: array
          items: { $ref: '#/components/schemas/DeviceIngestionResponse' }
    IdentityAssertionEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data: { $ref: '#/components/schemas/IdentityResponse' }
    IdentityAssertionListEnvelope:
      type: object
      required: [correlationId, data]
      properties:
        correlationId: { type: string }
        data:
          type: array
          items: { $ref: '#/components/schemas/IdentityResponse' }
    ApiError:
      type: object
      required: [correlationId, code, message, timestamp]
      properties:
        correlationId: { type: string }
        code: { type: string }
        message: { type: string }
        timestamp: { type: string, format: date-time }
      example: { correlationId: "corr-123", code: "RESOURCE_NOT_FOUND", message: "Patient record not found: pat-404", timestamp: "2026-05-31T10:10:00Z" }
  responses:
    BadRequestResponse:
      description: Validation or request error
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationIdResponseHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example: { correlationId: "corr-123", code: "VALIDATION_ERROR", message: "Validation failed", timestamp: "2026-05-31T10:11:00Z" }
    NotFoundResponse:
      description: Resource not found
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationIdResponseHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example: { correlationId: "corr-123", code: "RESOURCE_NOT_FOUND", message: "Resource not found", timestamp: "2026-05-31T10:11:20Z" }
    ConflictResponse:
      description: Business rule conflict
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationIdResponseHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example: { correlationId: "corr-123", code: "SLOT_ALREADY_BOOKED", message: "Slot is already booked", timestamp: "2026-05-31T10:11:30Z" }
    InternalServerErrorResponse:
      description: Unexpected server error
      headers:
        X-Correlation-Id:
          $ref: '#/components/headers/CorrelationIdResponseHeader'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          example: { correlationId: "corr-123", code: "INTERNAL_ERROR", message: "Unexpected server error", timestamp: "2026-05-31T10:11:40Z" }
security:
  - bearerAuth: []
paths:
  /patients:
    parameters:
      - $ref: '#/components/parameters/CorrelationIdHeader'
    post:
      summary: Onboard a patient
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatientRequest'
            examples:
              onboardPatient:
                value:
                  externalReference: EXT-1001
                  givenName: Ananya
                  familyName: Sharma
                  birthDate: 1988-06-21
      responses:
        '201':
          description: Patient created
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationIdResponseHeader'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PatientEnvelope' }
              examples:
                created:
                  value:
                    correlationId: corr-123
                    data:
                      id: pat-1001
                      status: ACTIVE
                      externalReference: EXT-1001
                      givenName: Ananya
                      familyName: Sharma
                      birthDate: 1988-06-21
        '400': { $ref: '#/components/responses/BadRequestResponse' }
        '409': { $ref: '#/components/responses/ConflictResponse' }
        '500': { $ref: '#/components/responses/InternalServerErrorResponse' }
    get:
      summary: List patients
      responses:
        '200':
          description: Patient collection
          headers:
            X-Correlation-Id:
              $ref: '#/components/headers/CorrelationIdResponseHeader'
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PatientListEnvelope' }
              examples:
                list:
                  value:
                    correlationId: corr-123
                    data:
                      - id: pat-1001
                        status: ACTIVE
