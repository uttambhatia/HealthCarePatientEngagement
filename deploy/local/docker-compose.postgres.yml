services:
  postgres:
    image: postgres:16
    container_name: healthcare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: healthcare
      POSTGRES_PASSWORD: healthcare
      POSTGRES_DB: healthcare
    ports:
      - "5432:5432"
    volumes:
      - healthcare_postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthcare -d healthcare"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  healthcare_postgres_data:
