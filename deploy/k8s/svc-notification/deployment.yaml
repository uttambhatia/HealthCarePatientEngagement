apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-notification
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-notification
  template:
    metadata:
      labels:
        app: svc-notification
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: svc-notification
          image: ghcr.io/uttambhatia/healthcarepatientengagement/svc-notification:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8086
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: aks
            - name: PLATFORM_SECURITY_ENABLED
              value: "true"
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: com.microsoft.sqlserver.jdbc.SQLServerDriver
            - name: SERVICEBUS_NAMESPACE
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: servicebus-namespace
            - name: SERVICEBUS_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: servicebus-connection-string
                  optional: true
            - name: EVENTHUB_NAMESPACE
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: eventhub-namespace
            - name: KEY_VAULT_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: key-vault-url
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: otel-otlp-endpoint
            - name: ACS_INTEGRATION_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: acs-integration-base-url
                  optional: true
            - name: FOLLOWUP_APPOINTMENT_BASE_URL
              value: http://svc-appointment:80
            - name: NOTIFICATION_DB_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: azure-sql-jdbc-url
            - name: NOTIFICATION_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: azure-sql-username
            - name: NOTIFICATION_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: azure-sql-password
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: azure-managed-identity-client-id
            - name: OAUTH2_ISSUER
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: oauth2-issuer
            - name: OAUTH2_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: oauth2-audience
            - name: OAUTH2_JWK_SET_URI
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: oauth2-jwk-set-uri
            - name: TELECONSULT_COMPLETED_TOPIC
              value: teleconsultation-completed
            - name: TELECONSULT_COMPLETED_SUBSCRIPTION
              value: notification-service
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8086

