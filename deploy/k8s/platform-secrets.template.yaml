apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
type: Opaque
stringData:
  servicebus-namespace: "<servicebus-namespace>.servicebus.windows.net"
  eventhub-namespace: "<eventhub-namespace>.servicebus.windows.net"
  key-vault-url: "https://<key-vault-name>.vault.azure.net/"
  fhir-integration-base-url: "https://<fhir-service-endpoint>"
  service-bus-integration-base-url: "https://<service-bus-adapter-endpoint>"
  acs-integration-base-url: "http://svc-identity-adapter"
  teleconsult-acs-integration-base-url: "http://svc-identity-adapter"
  teleconsult-join-base-url: "https://<teleconsult-public-host>/session"
  acs-email-endpoint: "https://<acs-email-resource>.communication.azure.com"
  acs-email-access-key: "<acs-email-access-key>"
  acs-email-from-address: "donotreply@<acs-email-domain>"
  acs-sms-endpoint: "https://<acs-resource>.communication.azure.com"
  acs-sms-access-key: "<acs-sms-access-key>"
  acs-sms-from-number: "+1<acs-sms-number>"
  acs-identity-connection-string: "endpoint=https://<acs-resource>.communication.azure.com/;accesskey=<acs-access-key>"
  otel-otlp-endpoint: "http://otel-collector.monitoring.svc.cluster.local:4317"
  oauth2-issuer: "https://login.microsoftonline.com/<tenant-id>/v2.0"
  oauth2-audience: "api://<entra-app-id-uri>"
  oauth2-jwk-set-uri: "https://login.microsoftonline.com/<tenant-id>/discovery/v2.0/keys"
  azure-sql-jdbc-url: "jdbc:sqlserver://<sql-server>.database.windows.net:1433;database=<shared-db-name>;encrypt=true;hostNameInCertificate=*.database.windows.net;loginTimeout=30;"
  azure-sql-username: "<sql-user>"
  azure-sql-password: "<sql-password-or-token-placeholder>"
  azure-managed-identity-client-id: "<user-assigned-managed-identity-client-id>"
