apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: svc-identity-adapter-ingress
spec:
  podSelector:
    matchLabels:
      app: svc-identity-adapter
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - protocol: TCP
          port: 8090
