apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-identity-adapter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-identity-adapter
  template:
    metadata:
      labels:
        app: svc-identity-adapter
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: svc-identity-adapter
          image: ghcr.io/uttambhatia/healthcarepatientengagement/svc-identity-adapter:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8090
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: aks
            - name: PLATFORM_SECURITY_ENABLED
              value: "true"
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: com.microsoft.sqlserver.jdbc.SQLServerDriver
            - name: SERVICEBUS_NAMESPACE
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: servicebus-namespace
            - name: EVENTHUB_NAMESPACE
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: eventhub-namespace
            - name: KEY_VAULT_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: key-vault-url
            - name: ACS_EMAIL_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: acs-email-endpoint
                  optional: true
            - name: ACS_EMAIL_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: acs-email-access-key
                  optional: true
            - name: ACS_EMAIL_FROM_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: acs-email-from-address
                  optional: true
            - name: ACS_SMS_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: acs-sms-endpoint
                  optional: true
            - name: ACS_SMS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: acs-sms-access-key
                  optional: true
            - name: ACS_SMS_FROM_NUMBER
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: acs-sms-from-number
                  optional: true
            - name: ACS_IDENTITY_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: acs-identity-connection-string
                  optional: true
            - name: ACS_TELECONSULT_JOIN_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: teleconsult-join-base-url
                  optional: true
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: otel-otlp-endpoint
            - name: IDENTITY_ADAPTER_DB_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: azure-sql-jdbc-url
            - name: IDENTITY_ADAPTER_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: azure-sql-username
            - name: IDENTITY_ADAPTER_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: azure-sql-password
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: azure-managed-identity-client-id
            - name: OAUTH2_ISSUER
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: oauth2-issuer
            - name: OAUTH2_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: oauth2-audience
            - name: OAUTH2_JWK_SET_URI
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: oauth2-jwk-set-uri
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8090
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8090
            failureThreshold: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8090

