apiVersion: apps/v1
kind: Deployment
metadata:
  name: svc-consent
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: svc-consent
  template:
    metadata:
      labels:
        app: svc-consent
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - svc-consent
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: svc-consent
      containers:
        - name: svc-consent
          image: ghcr.io/uttambhatia/healthcarepatientengagement/svc-consent:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: aks
            - name: CONSENT_PROCESSOR_ENABLED
              value: "false"
            - name: PLATFORM_SECURITY_ENABLED
              value: "true"
            - name: SPRING_DATASOURCE_DRIVER_CLASS_NAME
              value: com.microsoft.sqlserver.jdbc.SQLServerDriver
            - name: SERVICEBUS_NAMESPACE
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: servicebus-namespace
            - name: EVENTHUB_NAMESPACE
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: eventhub-namespace
            - name: KEY_VAULT_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: key-vault-url
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: otel-otlp-endpoint
            - name: CONSENT_DB_URL
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: azure-sql-jdbc-url
            - name: CONSENT_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: azure-sql-username
            - name: CONSENT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: azure-sql-password
            - name: AZURE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: azure-managed-identity-client-id
            - name: OAUTH2_ISSUER
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: oauth2-issuer
            - name: OAUTH2_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: oauth2-audience
            - name: OAUTH2_JWK_SET_URI
              valueFrom:
                secretKeyRef:
                  name: platform-secrets
                  key: oauth2-jwk-set-uri
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084

