apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
  namespace: healthcare-prod
type: Opaque
stringData:
  servicebus-namespace: "hpe-prod-sb.servicebus.windows.net"
  eventhub-namespace: "hpe-prod-eh.servicebus.windows.net"
  key-vault-url: "https://hpe-prod-kv.vault.azure.net/"
  fhir-integration-base-url: "https://hpe-prod-fhir.azurehealthcareapis.com"
  service-bus-integration-base-url: "https://svc-event-messaging.healthcare-prod.svc.cluster.local"
  acs-integration-base-url: "http://svc-identity-adapter"
  teleconsult-acs-integration-base-url: "http://svc-identity-adapter"
  teleconsult-join-base-url: "https://<prod-teleconsult-public-host>/session"
  acs-email-endpoint: "https://<prod-acs-email-resource>.communication.azure.com"
  acs-email-access-key: "<prod-acs-email-access-key>"
  acs-email-from-address: "donotreply@<prod-acs-email-domain>"
  acs-sms-endpoint: "https://<prod-acs-resource>.communication.azure.com"
  acs-sms-access-key: "<prod-acs-sms-access-key>"
  acs-sms-from-number: "+1<prod-acs-sms-number>"
  acs-identity-connection-string: "endpoint=https://<prod-acs-resource>.communication.azure.com/;accesskey=<prod-acs-access-key>"
  otel-otlp-endpoint: "http://otel-collector.monitoring.svc.cluster.local:4317"
  oauth2-issuer: "https://login.microsoftonline.com/<prod-tenant-id>/v2.0"
  oauth2-audience: "api://<prod-app-id-uri>"
  oauth2-jwk-set-uri: "https://login.microsoftonline.com/<prod-tenant-id>/discovery/v2.0/keys"
  azure-blob-connection-string: "DefaultEndpointsProtocol=https;AccountName=<prod-storage-account>;AccountKey=<prod-storage-account-key>;EndpointSuffix=core.windows.net"
  patient-idproof-container: "patient-id-proofs"
  profile-photo-container: "user-profile-photos"
  entra-api-app-id: "<prod-api-app-id>"
  entra-graph-base-url: "https://graph.microsoft.com/v1.0"
  entra-patient-group-name: "HCPE-PATIENT"
  entra-patient-role-value: "PATIENT"
  entra-invite-redirect-url: "https://myapplications.microsoft.com"
  azure-sql-jdbc-url: "jdbc:sqlserver://<prod-sql-server>.database.windows.net:1433;database=<prod-shared-db>;encrypt=true;hostNameInCertificate=*.database.windows.net;loginTimeout=30;"
  azure-sql-username: "<prod-sql-user>"
  azure-sql-password: "<prod-sql-password-or-token>"
  azure-managed-identity-client-id: "<prod-user-assigned-managed-identity-client-id>"
